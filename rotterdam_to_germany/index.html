<!DOCTYPE html>
<html>

<head>
    <title>Rotterdam To Germany - David Betteridge</title>
    <meta http-equiv='Content-Type' content='text/html; charset=utf-8' />
    <link rel="stylesheet" type="text/css" href="cycles.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
        />
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="">
    </script>
</head>

<body>

    <div class="row">

        <div class="column" id='map' style='height: 100vh;'></div>

        <div class="resizer" id="resizer">
            <div class="resizer-toggle" id="resizer-toggle">⋮</div>
        </div>

        <div class="column" id='printoutPanel'>

            <div class="title">Rotterdam To Germany</div>

            <ul>
                <li><input class="route" type="checkbox" value="Bikepacking_with_Josephine_Day_1_Rotterdam_Port_to_Utrecht.gpx"
                        data-colour="#ff0000">Day 1 - Rotterdam Port to Utrecht</input></li>
                <li><input class="route" type="checkbox" value="Bikepacking_with_Josephine_Day_2_Utrecht_to_Arnhem.gpx"
                        data-colour="#ff8000">Day 2 - Utrecht to Arnhem</input></li>
                <li><input class="route" type="checkbox" value="Bikepacking_with_Josephine_Day_3_Arnhem_to_Germany.gpx"
                        data-colour="#ffbf00">Day 3 - Arnhem to Germany</input></li>
                <li><input class="route" type="checkbox" value="Bikepacking_with_Josephine_Day_4_Campsite_NL_to_Emmerich_D_.gpx"
                        data-colour="#ffff00">Day 4 - Campsite to Emmerich</input></li>
            </ul>
        </div>
    </div>

    <script type='text/javascript' src='cycles.js'></script>
</body>

</html>
