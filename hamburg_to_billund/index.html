<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hamburg to Billund 2024 - David and Esther</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="/index.css">
    <link rel="stylesheet" type="text/css" href="cycles.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
        />
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="">
    </script>
</head>

<body>
    <div class="container" style="max-width: none; grid-template-columns: 1fr; grid-template-rows: auto 1fr;">
        <div class="item-header_logo">
            <div class="logo-wrapper">
                <a href="/index.html">
                    <img src="/images/david_betteridge.png" alt="Mr David Betteridge" class="top_left_logo">
                </a>
                <div class="item-header_text">
                    <span>David Betteridge</span>
                </div>
            </div>

            <div class="theme-switch-wrapper">
                <em>Theme</em>
                <select name="theme-selector" id="theme-selector">
                    <option value="blue">Blue</option>
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>
        </div>

        <div class="row">

            <div class="column" id='map' style='height: 100vh;'></div>

            <div class="resizer" id="resizer">
                <div class="resizer-toggle" id="resizer-toggle">⋮</div>
            </div>

            <div class="column" id='printoutPanel'>

                <div class="title">Hamburg to Billund</div>

                <ul>
                <li><input class="route" type="checkbox" value="Day_1.gpx"
                        data-colour="#ff0000">Day 1</input></li>
                <li><input class="route" type="checkbox" value="Day_2.gpx"
                        data-colour="#ff0000">Day 2</input></li>
                <li><input class="route" type="checkbox" value="Day_3.gpx"
                        data-colour="#ff0000">Day 3 </input></li>
                <li><input class="route" type="checkbox" value="Day_4.gpx"
                        data-colour="#ff0000">Day 4</input></li>
            </ul>
        </div>
    </div>
</div>

    <script type='text/javascript' src='/theme.js'></script>
    <script type='text/javascript' src='cycles.js'></script>
</body>

</html>
